name: Build APK

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs (debug + nightly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Debug ──────────────────────────────────────────────────────────────
      - name: Build vanilla debug APK
        run: ./gradlew assembleVanillaDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-debug
          path: app/build/outputs/apk/vanilla/debug/app-vanilla-debug.apk
          retention-days: 14

      # ── Nightly (release-grade, minified, AOSP-signed) ─────────────────────
      # signing.properties points to the public AOSP test key already in the repo.
      # Replace with your own key via repository secrets for production releases.
      - name: Set up signing for nightly
        run: |
          printf 'KEY_ALIAS=testkey\nKEY_PASSWORD=testkey\nSTORE_FILE=testkey.jks\n' \
            > app/signing.properties

      - name: Build vanilla nightly APK
        run: ./gradlew assembleVanillaNightly

      - name: Upload nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-nightly
          path: app/build/outputs/apk/vanilla/nightly/app-vanilla-nightly.apk
          retention-days: 14

  # ── Release (only when signing secrets are configured) ─────────────────────
  release:
    name: Build release APK (signed)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' &&
      vars.HAS_RELEASE_SIGNING == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks

      - name: Create signing.properties
        env:
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          printf 'KEY_ALIAS=%s\nKEY_PASSWORD=%s\nSTORE_FILE=release.jks\n' \
            "$KEY_ALIAS" "$KEY_PASSWORD" \
            > app/signing.properties

      - name: Build vanilla release APK
        run: ./gradlew assembleVanillaRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-release
          path: app/build/outputs/apk/vanilla/release/app-vanilla-release.apk
          retention-days: 90
