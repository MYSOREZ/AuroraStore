name: Build APK

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build vanilla debug APK
        run: ./gradlew assembleVanillaDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-debug
          path: app/build/outputs/apk/vanilla/debug/app-vanilla-debug.apk
          retention-days: 14
