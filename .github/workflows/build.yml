name: Build APK

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # signing.properties must be in the repo root — that is where
      # File("signing.properties") in app/build.gradle.kts resolves to.
      # STORE_FILE is resolved via Gradle file() relative to the :app module dir,
      # so "testkey.jks" points to app/testkey.jks which is already in the repo.
      - name: Set up signing (AOSP test key)
        run: |
          printf 'KEY_ALIAS=testkey\nKEY_PASSWORD=testkey\nSTORE_FILE=testkey.jks\n' \
            > signing.properties

      - name: Build debug APK
        run: ./gradlew assembleVanillaDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-debug
          path: app/build/outputs/apk/vanilla/debug/app-vanilla-debug.apk
          retention-days: 14

      - name: Build nightly APK
        run: ./gradlew assembleVanillaNightly

      - name: Upload nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-nightly
          path: app/build/outputs/apk/vanilla/nightly/app-vanilla-nightly.apk
          retention-days: 14

      - name: Build release APK
        run: ./gradlew assembleVanillaRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-vanilla-release
          path: app/build/outputs/apk/vanilla/release/app-vanilla-release.apk
          retention-days: 14
